name: Publish Pre-release Docker Image

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "requirements*.txt"
      - "VERSION"

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: prerelease-${{ github.head_ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/arm-ui
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/automatic-ripping-machine-ui

jobs:
  prerelease:
    if: startsWith(github.head_ref, 'release-please')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read VERSION file
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}-rc
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}-rc
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}-rc

      - name: Find existing pre-release comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Pre-release image published

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            Pre-release image published:
            - `${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}-rc`
            - `${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}-rc`
