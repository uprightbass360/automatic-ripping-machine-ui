name: Bump submodule

on:
  repository_dispatch:
    types: [contracts-bump-available]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_PAT }}

      - name: Bump components/contracts to main tip
        id: bump
        run: |
          git -C components/contracts fetch origin main --depth=1
          OLD=$(git -C components/contracts rev-parse HEAD)
          NEW=$(git -C components/contracts rev-parse origin/main)
          if [ "$OLD" = "$NEW" ]; then
            echo "already_current=true" >> "$GITHUB_OUTPUT"
            echo "Already at $NEW; nothing to do."
            exit 0
          fi
          git -C components/contracts checkout "$NEW"
          echo "already_current=false" >> "$GITHUB_OUTPUT"
          echo "short_sha=${NEW:0:7}" >> "$GITHUB_OUTPUT"
          echo "full_sha=$NEW" >> "$GITHUB_OUTPUT"

      - name: Configure git identity for PR
        if: steps.bump.outputs.already_current != 'true'
        run: |
          git config user.name "uprightbass360-bot"
          git config user.email "uprightbass360-bot@users.noreply.github.com"

      - name: Create PR
        if: steps.bump.outputs.already_current != 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.RELEASE_PAT }}
          branch: auto-bump/contracts-${{ steps.bump.outputs.short_sha }}
          delete-branch: true
          title: "chore: bump components/contracts to ${{ steps.bump.outputs.short_sha }}"
          body: |
            Automated submodule bump to contracts main.

            New SHA: `${{ steps.bump.outputs.full_sha }}`

            This PR is auto-generated by the Bump submodule workflow in
            response to a push to the automatic-ripping-machine-contracts
            repo. It is safe to merge as soon as CI is green.
          labels: auto-bump-contracts
          commit-message: |
            chore: bump components/contracts to ${{ steps.bump.outputs.short_sha }}
